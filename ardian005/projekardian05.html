<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>To-Do List Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        .task-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .progress-bar { transition: width 0.5s ease-in-out; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        /* Efek coret yang lebih halus */
        .line-through-custom {
            text-decoration: line-through;
            text-decoration-thickness: 2px;
            text-decoration-color: #6366f1;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-md rounded-[2rem] shadow-2xl border border-slate-100 flex flex-col h-[90vh] sm:h-[700px] overflow-hidden">
        
        <header class="bg-indigo-600 p-8 pb-10 text-white relative">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h1 class="text-2xl font-black tracking-tight">MY TASKS</h1>
                    <p id="currentDate" class="text-indigo-200 text-xs font-medium uppercase tracking-widest"></p>
                </div>
                <div class="bg-indigo-500/30 p-2 rounded-xl">
                    <i class="ph-fill ph-calendar-check text-2xl"></i>
                </div>
            </div>
            
            <div class="mt-4">
                <div class="flex justify-between text-xs mb-2 font-bold">
                    <span>Progress Harian</span>
                    <span id="progressText">0%</span>
                </div>
                <div class="w-full bg-indigo-900/20 rounded-full h-2">
                    <div id="progressBar" class="progress-bar bg-white h-2 rounded-full" style="width: 0%"></div>
                </div>
            </div>
        </header>

        <div class="flex-1 flex flex-col -mt-6 bg-white rounded-t-[2rem] z-20">
            
            <div class="flex justify-around p-2 border-b border-slate-50 text-sm font-semibold text-slate-400">
                <button onclick="setFilter('all')" id="filter-all" class="py-2 px-4 text-indigo-600 border-b-2 border-indigo-600">Semua</button>
                <button onclick="setFilter('active')" id="filter-active" class="py-2 px-4 hover:text-slate-600 transition">Aktif</button>
                <button onclick="setFilter('completed')" id="filter-completed" class="py-2 px-4 hover:text-slate-600 transition">Selesai</button>
            </div>

            <div class="p-6 flex gap-2">
                <input 
                    type="text" 
                    id="taskInput" 
                    class="flex-1 bg-slate-100 rounded-2xl px-5 py-3.5 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all text-slate-700 font-medium" 
                    placeholder="Tambah agenda baru..."
                >
                <button 
                    onclick="addTask()" 
                    class="bg-indigo-600 hover:bg-indigo-700 text-white w-14 rounded-2xl shadow-lg shadow-indigo-200 transition-all active:scale-90 flex items-center justify-center"
                >
                    <i class="ph-bold ph-plus text-xl"></i>
                </button>
            </div>

            <ul id="taskList" class="flex-1 overflow-y-auto px-6 space-y-3 pb-6">
                </ul>
        </div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('proTodoList')) || [];
        let currentFilter = 'all';

        // Tampilkan Tanggal Hari Ini
        const options = { weekday: 'long', day: 'numeric', month: 'long' };
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('id-ID', options);

        function saveAndRender() {
            localStorage.setItem('proTodoList', JSON.stringify(tasks));
            const list = document.getElementById('taskList');
            list.innerHTML = '';

            // Hitung Progress
            const total = tasks.length;
            const completedCount = tasks.filter(t => t.completed).length;
            const percentage = total === 0 ? 0 : Math.round((completedCount / total) * 100);
            
            document.getElementById('progressBar').style.width = percentage + '%';
            document.getElementById('progressText').textContent = percentage + '%';

            // Filter Tugas
            let filteredTasks = tasks;
            if (currentFilter === 'active') filteredTasks = tasks.filter(t => !t.completed);
            if (currentFilter === 'completed') filteredTasks = tasks.filter(t => t.completed);

            if (filteredTasks.length === 0) {
                list.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-slate-300 mt-10">
                        <i class="ph ph-sparkle text-5xl mb-2 opacity-20"></i>
                        <p class="text-sm font-medium italic">Tidak ada tugas di sini...</p>
                    </div>`;
            }

            filteredTasks.forEach(task => {
                const li = document.createElement('li');
                li.className = `task-transition group flex items-center justify-between p-4 rounded-2xl border ${task.completed ? 'bg-slate-50 border-transparent' : 'bg-white border-slate-100 shadow-sm hover:border-indigo-200'}`;
                
                li.innerHTML = `
                    <div class="flex items-center gap-4 flex-1 overflow-hidden">
                        <div onclick="toggleTask(${task.id})" class="cursor-pointer transition-transform active:scale-125">
                            <i class="ph-bold ${task.completed ? 'ph-check-circle text-green-500' : 'ph-circle text-slate-300'} text-2xl"></i>
                        </div>
                        <span id="text-${task.id}" class="truncate font-semibold ${task.completed ? 'line-through-custom text-slate-400' : 'text-slate-700'}" onclick="enableEdit(${task.id})">
                            ${escapeHTML(task.text)}
                        </span>
                    </div>
                    <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="enableEdit(${task.id})" class="p-2 text-slate-400 hover:text-indigo-500"><i class="ph-bold ph-pencil-simple"></i></button>
                        <button onclick="deleteTask(${task.id})" class="p-2 text-slate-400 hover:text-red-500"><i class="ph-bold ph-trash"></i></button>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            if (input.value.trim()) {
                tasks.unshift({ id: Date.now(), text: input.value.trim(), completed: false });
                input.value = '';
                saveAndRender();
            }
        }

        window.toggleTask = (id) => {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveAndRender();
            }
        };

        window.deleteTask = (id) => {
            if(confirm('Hapus tugas ini?')) {
                tasks = tasks.filter(t => t.id !== id);
                saveAndRender();
            }
        };

        window.enableEdit = (id) => {
            const task = tasks.find(t => t.id === id);
            const newText = prompt("Edit Tugas:", task.text);
            if (newText !== null && newText.trim() !== "") {
                task.text = newText.trim();
                saveAndRender();
            }
        };

        window.setFilter = (filter) => {
            currentFilter = filter;
            // Update UI Tab
            ['all', 'active', 'completed'].forEach(f => {
                const el = document.getElementById(`filter-${f}`);
                el.className = f === filter 
                    ? "py-2 px-4 text-indigo-600 border-b-2 border-indigo-600" 
                    : "py-2 px-4 hover:text-slate-600 transition";
            });
            saveAndRender();
        };

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag]));
        }

        document.getElementById('taskInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });

        saveAndRender();
    </script>
</body>
</html>
